<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment</title>
    <link rel="stylesheet" href="/public/css/style.css">
<script src="/public/js/app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="checkout-wrapper">
        <div class="checkout-card">
            <div class="checkout-header">
                <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                <h2>Secure Payment</h2>
                <p>Enter your details and amount to proceed directly to checkout.</p>
            </div>
            
            <form id="paymentForm" autocomplete="on">
                <div class="form-section">
                    <div class="form-group amount-group">
                        <label for="amount">Payment Amount</label>
                        <div class="input-prefix-wrapper">
                            <span class="currency-symbol">€</span>
                            <input type="number" id="amount" name="amount" step="0.01" min="1.00" required placeholder="0.00" autofocus>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" name="fullName" required placeholder="e.g. Jane Doe">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="jane@example.com">
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number <span class="optional">(Optional)</span></label>
                        <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000">
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-group">
                        <label for="reference">Reference / Invoice # <span class="optional">(Optional)</span></label>
                        <input type="text" id="reference" name="reference" placeholder="INV-10023">
                    </div>

                    <div class="form-group">
                        <label for="note">Additional Notes <span class="optional">(Optional)</span></label>
                        <textarea id="note" name="note" rows="2" placeholder="Any details we should know..."></textarea>
                    </div>
                </div>

                <div id="errorMessage" class="error-alert" style="display: none;"></div>

                <button type="submit" id="submitBtn" class="btn-primary">
                    <span class="btn-text">Proceed to Checkout</span>
                    <span class="spinner" style="display: none;"></span>
                </button>

                <div class="secure-badge">
                    <span>Guaranteed safe & secure checkout powered by Shopify</span>
                </div>
            </form>
        </div>
    </div>
    <script src="proxy/public/js/app.js"></script>
</body>
</html>
