<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>
    <div class="checkout-wrapper">
        <div class="checkout-card">
            
            <div class="checkout-header">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </div>
                <h2>Secure Checkout</h2>
                <p>Complete your payment securely below.</p>
            </div>
            
            <form id="paymentForm" autocomplete="on">
                
                <div class="premium-amount-box">
                    <label for="amount">Total Amount</label>
                    <div class="amount-input-wrapper">
                        <span class="currency-symbol">€</span>
                        <input type="number" id="amount" name="amount" step="0.01" min="1.00" required placeholder="0.00" autofocus>
                    </div>
                </div>

                <div class="form-section-title">Billing Details</div>
                
                <div class="form-row">
                    <div class="form-group half-width">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" name="fullName" required placeholder="John Doe">
                    </div>
                    <div class="form-group half-width">
                        <label for="phone">Phone <span class="optional">(Optional)</span></label>
                        <input type="tel" id="phone" name="phone" placeholder="+1 234 567 8900">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="john@example.com">
                </div>

                <div class="form-row">
                    <div class="form-group half-width">
                        <label for="reference">Reference # <span class="optional">(Optional)</span></label>
                        <input type="text" id="reference" name="reference" placeholder="INV-001">
                    </div>
                    <div class="form-group half-width">
                        <label for="note">Order Note <span class="optional">(Optional)</span></label>
                        <input type="text" id="note" name="note" placeholder="Any special instructions...">
                    </div>
                </div>

                <div id="errorMessage" class="error-alert" style="display: none;"></div>

                <button type="submit" id="submitBtn" class="btn-primary">
                    <span class="btn-text">Pay Now</span>
                    <span class="spinner" style="display: none;"></span>
                </button>

                <div class="trust-footer">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    <span>Payments are encrypted and secured by Shopify</span>
                </div>

            </form>
        </div>
    </div>
    <script src="/public/js/app.js"></script>
</body>
</html>
